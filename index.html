<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxyGazer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">GalaxyGazer</div>
    </nav>
    <main class="split-layout">
        <div class="left-panel">
            <div class="glass-card form-card">
                <div class="form-header">
                    <h3>See the universe on the day you were born !</h3>
                    <p>Select your birth date to see your star.</p>
                </div>
                <div class="inputs-row">
                    <div class="input-group">
                        <label>MONTH</label>
                        <select id="month-select">
                            <option value="" disabled selected>Select</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>DAY</label>
                        <select id="day-select">
                            <option value="" disabled selected>Day</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>YEAR</label>
                        <select id="year-select">
                            <option value="" disabled selected>Year</option>
                        </select>
                    </div>
                </div>
                <button id="fetch-btn">See Space Photo</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="glass-card gallery-container">
                <div id="gallery-grid" class="minimal-grid"></div>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <button id="close-modal">&times;</button>
            <img id="modal-img" src="" alt="">
            <h2 id="modal-title"></h2>
            <p id="modal-date" class="highlight-date"></p>
            <p id="modal-desc"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
